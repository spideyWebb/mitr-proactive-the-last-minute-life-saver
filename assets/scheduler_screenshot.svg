<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" fill="#0B0F17"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="600" cy="150" r="250" fill="url(#glow)"/>
  
  <!-- Sidebar -->
  <rect width="200" height="500" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <text x="25" y="45" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="bold" font-size="18">🌟 Mitr Proactive</text>
  
  <!-- Sidebar Links -->
  <text x="25" y="95" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14">🏠 Home</text>
  
  <rect x="10" y="115" width="180" height="35" rx="6" fill="#1E1B4B" stroke="#4F46E5" stroke-width="1"/>
  <text x="25" y="138" fill="#818CF8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">🎯 Task Planner</text>
  
  <text x="25" y="185" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14">🔥 Habit Tracker</text>
  <text x="25" y="225" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14">📅 Calendar</text>
  <text x="25" y="265" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14">💬 Mitr Companion</text>
  <text x="25" y="305" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="14">🎙️ Voice Assistant</text>

  <!-- Main Scheduler -->
  <!-- Top Title -->
  <rect x="220" y="20" width="560" height="55" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="240" y="52" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="bold" font-size="16">🎯 Cognitive Task Planner &amp; AI Scheduler</text>

  <!-- Allocation Card -->
  <rect x="220" y="90" width="360" height="120" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="240" y="120" fill="#F8FAFC" font-family="system-ui, sans-serif" font-weight="bold" font-size="14">Daily Allocation Slider</text>
  
  <!-- Progress Bars -->
  <rect x="240" y="150" width="320" height="8" rx="4" fill="#334155"/>
  <rect x="240" y="150" width="200" height="8" rx="4" fill="#06B6D4"/>
  <circle cx="440" cy="154" r="10" fill="#FFFFFF" stroke="#06B6D4" stroke-width="3"/>
  <text x="240" y="185" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Allocated Mins: <tspan fill="#FFFFFF" font-weight="bold">240 Mins (4.0 Hrs)</tspan></text>

  <!-- Risk Metric Card -->
  <rect x="595" y="90" width="185" height="120" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="687" y="115" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Burnout Prediction</text>
  <circle cx="687" cy="155" r="24" fill="none" stroke="#334155" stroke-width="5"/>
  <circle cx="687" cy="155" r="24" fill="none" stroke="#10B981" stroke-width="5" stroke-dasharray="150" stroke-dashoffset="115"/>
  <text x="687" y="160" fill="#10B981" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">15%</text>
  <text x="687" y="195" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Low Risk Zone</text>

  <!-- Timetable -->
  <rect x="220" y="225" width="560" height="255" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="240" y="255" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="bold" font-size="14">Chronological AI Optimized Timeline</text>
  <line x1="240" y1="270" x2="760" y2="270" stroke="#334155" stroke-width="1"/>

  <!-- Task 1 -->
  <text x="240" y="300" fill="#06B6D4" font-family="system-ui, sans-serif" font-weight="bold" font-size="13">09:00 AM</text>
  <text x="335" y="300" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="13">SpringBoot Dependencies Study</text>
  <rect x="610" y="286" width="70" height="18" rx="4" fill="#FEE2E2"/>
  <text x="645" y="299" fill="#EF4444" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">HIGH PRIO</text>
  <rect x="695" y="286" width="65" height="18" rx="4" fill="#D1FAE5"/>
  <text x="727" y="299" fill="#059669" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Scheduled</text>

  <!-- Task 2 -->
  <text x="240" y="340" fill="#06B6D4" font-family="system-ui, sans-serif" font-weight="bold" font-size="13">11:00 AM</text>
  <text x="335" y="340" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="13">Meditation &amp; Breathing Practice</text>
  <rect x="610" y="326" width="70" height="18" rx="4" fill="#F3F4F6"/>
  <text x="645" y="339" fill="#4B5563" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">LOW PRIO</text>
  <rect x="695" y="326" width="65" height="18" rx="4" fill="#D1FAE5"/>
  <text x="727" y="339" fill="#059669" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Scheduled</text>

  <!-- Task 3 -->
  <text x="240" y="380" fill="#06B6D4" font-family="system-ui, sans-serif" font-weight="bold" font-size="13">02:00 PM</text>
  <text x="335" y="380" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="13">Build React Interfaces &amp; Views</text>
  <rect x="610" y="366" width="70" height="18" rx="4" fill="#FFFBEB"/>
  <text x="645" y="379" fill="#D97706" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">MED PRIO</text>
  <rect x="695" y="366" width="65" height="18" rx="4" fill="#D1FAE5"/>
  <text x="727" y="379" fill="#059669" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Scheduled</text>
</svg>